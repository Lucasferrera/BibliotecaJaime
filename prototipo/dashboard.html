<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #f0f2f0
        }
        
        .navbar {
            background-color: #2c3424;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        
        .logo {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .logo span {
            color: #959581;
        }
        
        .nav-links {
            list-style: none;
            display: flex;
        }
        
        .nav-links li {
            margin-left: 25px;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #daded8;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 15px;
            border-radius: 5px;
        }
        
        .nav-links a:hover {
            background-color: #4c583e;
            color: #ffffff;
        }
        
        .btn-entrar {
            background-color: #4c583e;
            color: white !important;
            border: 1px solid #959581;
        }
        
        .btn-entrar:hover {
            background-color: #959581 !important;
            transform: translateY(-2px);
        }
        
        .container_usuarios {
            background-color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin-top: 150px;
            padding: 40px;
            width: 300px;
            margin-left: 90px;
            text-align: center;
            border-radius: 8px;
            border: none;
            border-top: 8px solid #2c3424;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: #2c3424;
        }
        
        .container_livros {
            background-color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin-top: 150px;
            padding: 40px;
            width: 300px;
            margin-left: 90px;
            text-align: center;
            border-radius: 8px;
            border: none;
            border-top: 8px solid #2c3424;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: #2c3424;
        }
        
        .container_pai {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }
        
        .container_usuarios h3,
        .container_livros h3 {
            font-size: 14px;
            letter-spacing: 2px;
            color: #959581;
            margin-bottom: 10px;
        }
        
        .container_usuarios p,
        .container_livros p {
            font-size: 64px;
            margin: 0;
            color: #2c3424;
            line-height: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container_usuarios p::after,
        .container_livros p::after {
            display: block;
            width: 40px;
            height: 4px;
            background-color: #768064;
            margin-top: 10px;
            border-radius: 2px;
        }
        
        .container_usuarios p {
            text-shadow: 2px 2px 0px #daded8;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">BIBLIO<span>TECA</span></div>
        <ul class="nav-links">
            <li><a href="#">Início</a></li>
            <li><a href="#">Acervo</a></li>
            <li><a href="#">Usuários</a></li>
            <li><a href="#" class="btn-entrar">Entrar</a></li>
        </ul>
    </nav>



    <div class="container_pai">
        <div class="container_usuarios">
            <h3>USUÁRIOS</h3>
            <p>8</p>
            <span style="font-family: sans-serif; font-size: 12px; color: #768064;">Ativos no sistema</span>
        </div>

        <div class="container_livros">
            <h3>LIVROS</h3>
            <p>67</p>
            <span style="font-family: sans-serif; font-size: 12px; color: #768064;">Títulos cadastrados</span>
        </div>
    </div>
</body>

</html>
